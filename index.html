<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Virtual Chick 🐥</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">
    <div id="chick" class="chick">
    <span></span>
</div>

    <!-- AYAM -->
    <div id="chick" class="chick">
        <span></span>
    </div>

    <!-- PESAN -->
    <p id="msg">Halo! 🐥</p>

    <!-- BUTTON -->
    <div>
        <button onclick="feed()">🍗</button>
        <button onclick="drink()">💧</button>
        <button onclick="play()">🎾</button>
        <button onclick="sleep()">😴</button>
        <button onclick="sound()">🔊</button>
    </div>

    <!-- STATUS BAR -->
    <p>Lapar</p>
    <div class="bar"><div id="hungerBar" class="fill"></div></div>

    <p>Haus</p>
    <div class="bar"><div id="thirstBar" class="fill"></div></div>

    <p>Mood</p>
    <div class="bar"><div id="moodBar" class="fill"></div></div>

    <!-- INFO -->
    <p>❤️ Affection: <span id="affection">0</span></p>
    <p>⭐ Level: <span id="level">1</span></p>
</div>

<!-- SOUND -->
<audio id="sound" src="https://www.soundjay.com/animal/chicken-cluck-1.mp3"></audio>

<!-- JS FILE -->
<script src="script.js"></script>

</body>
</html>
